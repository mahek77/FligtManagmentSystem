<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Available Flights</title>
    <link rel="stylesheet" href="user.css">
</head>
<body>
<div class="navbar">
    <div class="brand">
        <img src="img.png" class="logo">
        <h2>Fly In Sky</h2>
    </div>
    <button onclick="logout()">Logout</button>
</div>
<div class="container">
    <h1>Available Flights</h1>
    <p>Select any flight to create booking.</p>

    <table>
        <thead>
        <tr>
            <th>Id</th>
            <th>Flight No</th>
            <th>Flight Name</th>
            <th>From</th>
            <th>To</th>
            <th>Departure Date</th>
            <th>Departure Time</th>
            <th>Price</th>
            <th>Seats</th>
            <th>Action</th>
        </tr>
        </thead>

        <tbody id="flightTable"></tbody>
    </table>
</div>

<script src="user.js"></script>
</body>
</html>
